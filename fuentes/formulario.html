<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de basura</title>
</head>
<body>
    <main>
        <h1>Formulario de basura</h1>
        <a href="menu.html">← Volver al menú</a>

        <form id="form-basura">
            <div class="campo">
                <label for="nombre">Nombre de la basura:</label>
                <input id="nombre" name="nombre" type="text" placeholder="Ej. cable, tapa, trozo" required />
            </div>
            <div class="campo">
                <label for="colorBasura">Color de la basura:</label>
                <input id="colorBasura" name="colorBasura" type="text" placeholder="Ej. rojo, verde, gris" required />
            </div>
            <div class="campo">
                <label for="pesoBasura">Peso de la basura (kg):</label>
                <input id="pesoBasura" name="pesoBasura" type="number" min="0" step="0.01" placeholder="0.00" required />
            </div>
            <div class="campo">
                <label for="material">Material o tipo:</label>
                <select id="material" name="material" required>
                    <option value="">Elige un material</option>
                    <option value="oro">Oro</option>
                    <option value="plata">Plata</option>
                    <option value="cobre">Cobre</option>
                    <option value="aluminio">Aluminio</option>
                    <option value="hierro">Hierro</option>
                    <option value="plastico">Plástico</option>
                    <option value="vidrio">Vidrio</option>
                    <option value="papel">Papel</option>
                </select>
            </div>
            <div class="campo">
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" name="descripcion" rows="4" placeholder="Describe el estado o detalles" required></textarea>
            </div>
            <div class="campo">
                <label>Estado:</label>
                <label><input type="radio" name="estado" value="nuevo" required /> Nuevo</label>
                <label><input type="radio" name="estado" value="usado" /> Usado</label>
                <label><input type="radio" name="estado" value="rotura" /> Roto</label>
            </div>
            <div class="campo">
                <label><input id="reciclable" name="reciclable" type="checkbox" /> Reciclable</label>
            </div>
            <div class="campo">
                <label for="fecha">Fecha de recogida:</label>
                <input id="fecha" name="fecha" type="date" required />
            </div>

            <input type="hidden" name="origen" value="formulario-basura" />
            <button type="submit">Enviar</button>
        </form>
    </main>
    <script src="basura.js"></script>
</body>
</html>
